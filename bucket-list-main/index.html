<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 버킷 리스트</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen py-10 bg-gradient-main">
    <div class="container mx-auto px-4 max-w-2xl">
        <!-- 헤더 -->
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-yellow-900 mb-3 drop-shadow-lg tracking-tight">🎯 나의 버킷 리스트</h1>
            <p class="text-yellow-800 text-lg">인생에서 꼭 이루고 싶은 것들을 기록하세요</p>
        </header>

        <!-- 통계 -->
        <div class="stats-card rounded-2xl shadow-xl p-6 mb-8">
            <div class="grid grid-cols-4 gap-4 text-center">
                <div class="stat-item">
                    <p class="text-3xl font-extrabold text-indigo-600" id="totalCount">0</p>
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mt-1">전체</p>
                </div>
                <div class="stat-item">
                    <p class="text-3xl font-extrabold text-emerald-500" id="completedCount">0</p>
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mt-1">완료</p>
                </div>
                <div class="stat-item">
                    <p class="text-3xl font-extrabold text-amber-500" id="progressCount">0</p>
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mt-1">진행중</p>
                </div>
                <div class="stat-item">
                    <p class="text-3xl font-extrabold text-violet-500" id="completionRate">0%</p>
                    <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider mt-1">달성률</p>
                </div>
            </div>
        </div>

        <!-- 입력 폼 -->
        <div class="glass-card rounded-2xl shadow-xl p-6 mb-8">
            <form id="bucketForm" class="flex gap-3">
                <input
                    type="text"
                    id="bucketInput"
                    placeholder="새로운 버킷 리스트를 입력하세요..."
                    class="flex-1 px-5 py-3 border-0 rounded-xl bg-white/70 focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-gray-400 text-gray-700 shadow-inner"
                    required
                >
                <button
                    type="submit"
                    class="add-btn px-7 py-3 text-white rounded-xl font-semibold shadow-lg"
                >
                    추가
                </button>
            </form>
        </div>

        <!-- 필터 -->
        <div class="flex gap-2 justify-center mb-8">
            <button
                class="filter-btn px-6 py-2.5 rounded-full font-semibold text-sm transition-all active"
                data-filter="all"
            >
                전체
            </button>
            <button
                class="filter-btn px-6 py-2.5 rounded-full font-semibold text-sm transition-all"
                data-filter="active"
            >
                진행중
            </button>
            <button
                class="filter-btn px-6 py-2.5 rounded-full font-semibold text-sm transition-all"
                data-filter="completed"
            >
                완료
            </button>
        </div>

        <!-- 버킷 리스트 목록 -->
        <div id="bucketListContainer" class="space-y-4">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- 빈 상태 메시지 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-yellow-900/60 text-lg">아직 버킷 리스트가 없습니다.</p>
            <p class="text-yellow-900/40 mt-1">위에서 새로운 목표를 추가해보세요!</p>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="glass-card rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-5 text-gray-800">버킷 리스트 수정</h3>
            <form id="editForm">
                <input
                    type="text"
                    id="editInput"
                    class="w-full px-5 py-3 border-0 rounded-xl bg-white/70 focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-5 shadow-inner text-gray-700"
                    required
                >
                <div class="flex gap-3 justify-end">
                    <button
                        type="button"
                        id="cancelEdit"
                        class="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition-all font-medium"
                    >
                        취소
                    </button>
                    <button
                        type="submit"
                        class="add-btn px-5 py-2.5 text-white rounded-xl font-semibold shadow-lg"
                    >
                        저장
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
